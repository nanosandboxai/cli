name: CI

on:
  push:
    tags: [v*]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  # ==========================================================================
  # Build + Test
  # ==========================================================================
  build:
    name: Build CLI (macOS arm64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Auth for private crates (sandbox → runtime) ──────────
      - name: Configure git auth for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com/nanosandboxai/sandbox".insteadOf "https://github.com/nanosandboxai/sandbox"
          git config --global url."https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com/nanosandboxai/runtime".insteadOf "https://github.com/nanosandboxai/runtime"

      # ── Toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Inject version from tag ─────────────────────────────
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting Cargo.toml version to ${TAG_VERSION}"
          sed -i '' "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          grep '^version' Cargo.toml

      # ── Update deps to latest ───────────────────────────────
      - name: Update dependencies
        run: cargo update

      # ── Build ─────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Run tests
        run: cargo test --target aarch64-apple-darwin

      # ── Codesign (macOS) ──────────────────────────────────────
      # Ad-hoc codesign so the binary can use Hypervisor.framework.
      # The install.sh re-codesigns on the user's machine (ad-hoc
      # signatures are invalidated after download).
      - name: Codesign binary
        run: |
          codesign --sign - \
            --entitlements entitlements.plist \
            --force \
            target/aarch64-apple-darwin/release/nanosb

      - name: Verify binary
        run: |
          ls -la target/aarch64-apple-darwin/release/nanosb
          file target/aarch64-apple-darwin/release/nanosb
          target/aarch64-apple-darwin/release/nanosb --version

      # ── Release ───────────────────────────────────────────────
      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cp target/aarch64-apple-darwin/release/nanosb nanosb
          cp scripts/install.sh install.sh
          chmod +x install.sh

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # Use --prerelease for rc/alpha/beta tags
          PRERELEASE_FLAG=""
          if echo "$TAG_NAME" | grep -qE '[-](rc|alpha|beta|dev)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            --title "nanosandbox $TAG_NAME" \
            --generate-notes \
            $PRERELEASE_FLAG \
            nanosb \
            install.sh

      # ── Artifacts (for PRs / non-release builds) ──────────────
      - name: Upload build artifacts
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-macos-arm64
          path: |
            target/aarch64-apple-darwin/release/nanosb
            scripts/
