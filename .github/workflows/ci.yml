name: CI

on:
  push:
    tags: [v*]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build-macos:
    name: Build CLI (macOS arm64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git auth for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.SANDBOX_PAT }}@github.com/nanosandboxai/sandbox".insteadOf "https://github.com/nanosandboxai/sandbox"
          git config --global url."https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com/nanosandboxai/runtime".insteadOf "https://github.com/nanosandboxai/runtime"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i '' "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          grep '^version' Cargo.toml


      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Run tests
        run: cargo test --target aarch64-apple-darwin

      - name: Codesign binary
        run: |
          codesign --sign - \
            --entitlements entitlements.plist \
            --force \
            target/aarch64-apple-darwin/release/nanosb

      - name: Verify binary
        run: |
          ls -la target/aarch64-apple-darwin/release/nanosb
          file target/aarch64-apple-darwin/release/nanosb
          target/aarch64-apple-darwin/release/nanosb --version

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-macos-arm64
          path: target/aarch64-apple-darwin/release/nanosb

  # ─── Linux amd64 — glibc floor pinned to 2.28 via cargo-zigbuild ───────────
  # Produces a binary that runs on any Linux distro with glibc >= 2.28
  # (Debian 12, openSUSE Leap 15.6, Fedora 40, Ubuntu 20.04+, etc.)
  build-linux:
    name: Build CLI (Linux amd64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git auth for private repos
        run: |
          git config --global url."https://x-access-token:${{ secrets.SANDBOX_PAT }}@github.com/nanosandboxai/sandbox".insteadOf "https://github.com/nanosandboxai/sandbox"
          git config --global url."https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com/nanosandboxai/runtime".insteadOf "https://github.com/nanosandboxai/runtime"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libclang-dev \
            python3 python3-pyelftools bc flex bison libelf-dev cpio libssl-dev

      - name: Install cargo-zigbuild
        run: pip3 install ziglang && cargo install cargo-zigbuild

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          grep '^version' Cargo.toml


      - name: Build release binary (glibc floor 2.28)
        run: cargo zigbuild --release --target x86_64-unknown-linux-gnu.2.28

      - name: Verify binary
        run: |
          file target/x86_64-unknown-linux-gnu/release/nanosb
          objdump -T target/x86_64-unknown-linux-gnu/release/nanosb | \
            grep GLIBC | grep -oP 'GLIBC_[0-9.]+' | sort -V | uniq | tail -3

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-linux-amd64
          path: target/x86_64-unknown-linux-gnu/release/nanosb

  # ─── Release: combine artifacts and publish ─────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nanosb-macos-arm64
          path: dist/macos/

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: nanosb-linux-amd64
          path: dist/linux/

      - name: Rename artifacts
        run: |
          mv dist/macos/nanosb dist/nanosb-macos-arm64
          mv dist/linux/nanosb dist/nanosb-linux-amd64
          ls -la dist/

      - name: Prepare install scripts
        run: |
          cp scripts/install.sh dist/install.sh
          cp scripts/uninstall.sh dist/uninstall.sh
          chmod +x dist/install.sh dist/uninstall.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PRERELEASE_FLAG=""
          if echo "$TAG_NAME" | grep -qE '[-](rc|alpha|beta|dev)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            --title "nanosandbox $TAG_NAME" \
            --generate-notes \
            $PRERELEASE_FLAG \
            dist/nanosb-macos-arm64 \
            dist/nanosb-linux-amd64 \
            dist/install.sh \
            dist/uninstall.sh
