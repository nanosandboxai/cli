name: CI

# Builds nanosb for macOS arm64, Linux x86_64, and Windows x86_64.
#
# Architecture:
#   1. build-kernel: Linux job that builds libkrunfw kernel.c and runs
#      extract_kernel to produce vmlinux.bin/guest_addr.txt/entry_addr.txt.
#      Cached by libkrunfw submodule SHA.  Required only for the Windows job
#      (libkrunfw-win embeds the kernel via include_bytes!).
#   2. build-{linux,macos,windows}: parallel cargo builds.  Each checks out
#      the sibling repos (sandbox, runtime) so cli's path deps resolve.
#   3. publish: collects all binaries + scripts and creates the GitHub
#      release.  rc/alpha/beta/dev tags are marked --prerelease.

on:
  push:
    tags: [v*]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Job 1: Extract Windows kernel bundle (Linux only — needed by Windows job)
  # ──────────────────────────────────────────────────────────────────────
  build-kernel:
    name: Extract Windows kernel bundle
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout runtime (for libkrunfw submodule + extract_kernel)
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/runtime
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RUNTIME_PAT }}
          submodules: recursive
          path: runtime

      - name: Cache extracted kernel bundle
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: kernel-bundle
          key: kernel-bundle-${{ hashFiles('runtime/deps/libkrunfw/**') }}-v2

      - name: Install kernel build dependencies
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential curl ca-certificates git \
            python3 python3-pyelftools \
            bc flex bison libelf-dev cpio libssl-dev xz-utils

      - name: Install Rust toolchain
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Build kernel.c (x86_64)
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd runtime/deps/libkrunfw
          make kernel.c -j$(nproc)
          ls -lh kernel.c

      - name: Compile libkrunfw.so from kernel.c
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd runtime/deps/libkrunfw
          cc -fPIC -DABI_VERSION=5 -shared -o libkrunfw.so.5 kernel.c
          ln -sf libkrunfw.so.5 libkrunfw.so
          ls -lh libkrunfw.so*

      - name: Build extract_kernel tool
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          cd runtime
          cargo build --release -p extract_kernel

      - name: Extract vmlinux.bin + addr files
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p kernel-bundle
          ./runtime/target/release/extract_kernel \
            --elf runtime/deps/libkrunfw/libkrunfw.so \
            kernel-bundle
          echo "=== Extracted ==="
          ls -lh kernel-bundle/

      - name: Upload kernel bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-kernel-bundle
          path: kernel-bundle/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Job 2: Linux x86_64 build
  # ──────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build CLI (Linux x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout cli
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Checkout sandbox
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/sandbox
          ref: ${{ github.ref_name }}
          token: ${{ secrets.SANDBOX_PAT }}
          path: sandbox

      - name: Checkout runtime (with submodules)
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/runtime
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RUNTIME_PAT }}
          submodules: recursive
          path: runtime

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cli-cargo-

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting cli/Cargo.toml version to ${TAG_VERSION}"
          sed -i "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" cli/Cargo.toml
          grep '^version' cli/Cargo.toml

      - name: Install build dependencies (libkrun runtime needs)
        run: bash runtime/scripts/ci/install-deps-apt.sh

      - name: Build release binary
        run: |
          cd cli
          cargo build --release

      - name: Verify binary
        run: |
          ls -la cli/target/release/nanosb
          file cli/target/release/nanosb
          cli/target/release/nanosb --version

      - name: Stage binary as nanosb-linux-amd64
        run: cp cli/target/release/nanosb nanosb-linux-amd64

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-linux-amd64
          path: nanosb-linux-amd64
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Job 3: macOS arm64 build
  # ──────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build CLI (macOS arm64)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout cli
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Checkout sandbox
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/sandbox
          ref: ${{ github.ref_name }}
          token: ${{ secrets.SANDBOX_PAT }}
          path: sandbox

      - name: Checkout runtime (with submodules)
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/runtime
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RUNTIME_PAT }}
          submodules: recursive
          path: runtime

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: ${{ runner.os }}-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cli-cargo-

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting cli/Cargo.toml version to ${TAG_VERSION}"
          sed -i '' "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" cli/Cargo.toml
          grep '^version' cli/Cargo.toml

      - name: Build release binary
        run: |
          cd cli
          cargo build --release --target aarch64-apple-darwin

      # Ad-hoc codesign so the binary can use Hypervisor.framework.  install.sh
      # re-codesigns on the user's machine (ad-hoc sigs are invalidated after
      # download).
      - name: Codesign binary
        run: |
          codesign --sign - \
            --entitlements cli/entitlements.plist \
            --force \
            cli/target/aarch64-apple-darwin/release/nanosb

      - name: Verify binary
        run: |
          ls -la cli/target/aarch64-apple-darwin/release/nanosb
          file cli/target/aarch64-apple-darwin/release/nanosb
          cli/target/aarch64-apple-darwin/release/nanosb --version

      - name: Stage binary as nanosb (macOS naming convention)
        run: cp cli/target/aarch64-apple-darwin/release/nanosb nanosb

      - name: Upload macOS binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-darwin-arm64
          path: nanosb
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Job 4: Windows x86_64 build
  # ──────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build CLI (Windows x86_64)
    runs-on: windows-latest
    needs: build-kernel
    permissions:
      contents: write
    steps:
      - name: Checkout cli
        uses: actions/checkout@v4
        with:
          path: cli

      - name: Checkout sandbox
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/sandbox
          ref: ${{ github.ref_name }}
          token: ${{ secrets.SANDBOX_PAT }}
          path: sandbox

      - name: Checkout runtime (with submodules)
        uses: actions/checkout@v4
        with:
          repository: nanosandboxai/runtime
          ref: ${{ github.ref_name }}
          token: ${{ secrets.RUNTIME_PAT }}
          submodules: recursive
          path: runtime

      - name: Download Windows kernel bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-kernel-bundle
          path: kernel-bundle

      - name: Stage kernel files for libkrunfw-win
        shell: bash
        run: |
          dest=runtime/deps/libkrun/src/libkrunfw-win
          cp kernel-bundle/vmlinux.bin "$dest/vmlinux.bin"
          cp kernel-bundle/guest_addr.txt "$dest/guest_addr.txt"
          cp kernel-bundle/entry_addr.txt "$dest/entry_addr.txt"
          echo "=== Staged kernel ==="
          ls -lh "$dest/vmlinux.bin" "$dest/guest_addr.txt" "$dest/entry_addr.txt"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            cli/target
          key: windows-cli-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: windows-cli-cargo-

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting cli/Cargo.toml version to ${TAG_VERSION}"
          sed -i "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" cli/Cargo.toml
          grep '^version' cli/Cargo.toml

      - name: Build release binary
        shell: bash
        run: |
          cd cli
          cargo build --release

      - name: Verify binary
        shell: bash
        run: |
          ls -la cli/target/release/nanosb.exe
          cli/target/release/nanosb.exe --version

      - name: Stage binary as nanosb.exe
        shell: bash
        run: cp cli/target/release/nanosb.exe nanosb.exe

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-windows-amd64
          path: nanosb.exe
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────
  # Job 5: Publish release
  # ──────────────────────────────────────────────────────────────────────
  publish:
    name: Publish release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout cli (for scripts)
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        run: |
          mkdir -p release
          cp artifacts/nanosb-darwin-arm64/nanosb release/nanosb
          cp artifacts/nanosb-linux-amd64/nanosb-linux-amd64 release/nanosb-linux-amd64
          cp artifacts/nanosb-windows-amd64/nanosb.exe release/nanosb.exe
          cp scripts/install.sh release/install.sh
          cp scripts/uninstall.sh release/uninstall.sh
          cp scripts/install.ps1 release/install.ps1
          cp scripts/uninstall.ps1 release/uninstall.ps1
          chmod +x release/install.sh release/uninstall.sh
          echo "=== Release files ==="
          ls -la release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # rc/alpha/beta/dev tags become pre-releases (don't supersede "Latest")
          PRERELEASE_FLAG=""
          if echo "$TAG_NAME" | grep -qE '[-](rc|alpha|beta|dev)'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            --title "nanosandbox $TAG_NAME" \
            --generate-notes \
            $PRERELEASE_FLAG \
            release/*
