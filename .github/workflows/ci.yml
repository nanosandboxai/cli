name: CI

on:
  push:
    tags: [v*]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  # ==========================================================================
  # Build + Test (macOS)
  # ==========================================================================
  build:
    name: Build CLI (macOS arm64)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Clone runtime repo (path dependency: ../runtime) ─────
      # Uses feature/windows-libkrun until Windows support is merged to main
      - name: Checkout runtime
        run: |
          git clone --depth 1 --branch feature/windows-libkrun \
            "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com/nanosandboxai/runtime.git" \
            ../runtime

      # ── Toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── System dependencies ───────────────────────────────────
      - name: Install libkrun
        run: |
          brew tap slp/krun
          brew install libkrun

      # ── Inject version from tag ─────────────────────────────
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting Cargo.toml version to ${TAG_VERSION}"
          sed -i '' "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          grep '^version' Cargo.toml
      # ── Build ─────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release --target aarch64-apple-darwin

      - name: Run tests
        run: cargo test --target aarch64-apple-darwin

      # ── Codesign (macOS) ──────────────────────────────────────
      # Ad-hoc codesign so the binary can use Hypervisor.framework.
      # The install.sh re-codesigns on the user's machine (ad-hoc
      # signatures are invalidated after download).
      - name: Codesign binary
        run: |
          codesign --sign - \
            --entitlements entitlements.plist \
            --force \
            target/aarch64-apple-darwin/release/nanosb

      - name: Verify binary
        run: |
          ls -la target/aarch64-apple-darwin/release/nanosb
          file target/aarch64-apple-darwin/release/nanosb
          target/aarch64-apple-darwin/release/nanosb --version

      # ── Upload artifacts ──────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-macos-arm64
          path: target/aarch64-apple-darwin/release/nanosb

  # ==========================================================================
  # Build (Windows)
  # ==========================================================================
  build-windows:
    name: Build CLI (Windows amd64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Clone runtime repo (path dependency: ../runtime) ─────
      # Uses feature/windows-libkrun until Windows support is merged to main
      - name: Checkout runtime
        shell: bash
        run: |
          git clone --depth 1 --branch feature/windows-libkrun \
            "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com/nanosandboxai/runtime.git" \
            ../runtime

      # ── Toolchain ─────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Inject version from tag ─────────────────────────────
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Setting Cargo.toml version to ${TAG_VERSION}"
          sed -i "s/^version = \".*\"/version = \"${TAG_VERSION}\"/" Cargo.toml
          grep '^version' Cargo.toml

      # ── Build ─────────────────────────────────────────────────
      - name: Build release binary
        run: cargo build --release

      # Tests are skipped — they require a Hyper-V hypervisor

      - name: Verify binary
        run: |
          Get-Item target\release\nanosb.exe
          target\release\nanosb.exe --version

      # ── Upload artifacts ──────────────────────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanosb-windows-amd64
          path: target/release/nanosb.exe

  # ==========================================================================
  # Release
  # ==========================================================================
  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: nanosb-macos-arm64
          path: artifacts/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nanosb-windows-amd64
          path: artifacts/windows

      - name: Prepare release assets
        run: |
          cp artifacts/macos/nanosb nanosb
          chmod +x nanosb
          cp artifacts/windows/nanosb.exe nanosb-windows-amd64.exe
          chmod +x scripts/install/*.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG_NAME" \
            --title "nanosandbox $TAG_NAME" \
            --generate-notes \
            --latest \
            nanosb \
            nanosb-windows-amd64.exe \
            scripts/install/install.sh \
            scripts/install/macos.sh \
            scripts/install/linux.sh \
            scripts/install/gvproxy.sh \
            scripts/install/uninstall.sh \
            scripts/install/windows.ps1 \
            scripts/install/uninstall-windows.ps1
