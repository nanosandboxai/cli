<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 75" width="100" height="75">
  <!-- Top face -->
  <polygon
    points="2,28 52,28 72,15 22,15"
    fill="#e0e0e0"
    stroke="#222"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Front face -->
  <polygon
    points="2,28 52,28 52,65 2,65"
    fill="white"
    stroke="#222"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Right face -->
  <polygon
    points="52,28 72,15 72,52 52,65"
    fill="#c0c0c0"
    stroke="#222"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- </> symbol on front face -->
  <text
    x="27"
    y="52"
    text-anchor="middle"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="16"
    font-weight="bold"
    fill="#222"
  >&lt;/&gt;</text>
</svg>
